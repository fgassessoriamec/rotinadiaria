<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rotina">
<meta name="theme-color" content="#f5f4ff">
<title>Rotina</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f4ff;
  --bg2:      #ffffff;
  --bg3:      #f0effe;
  --border:   #e8e6ff;
  --purple:   #7c6ff7;
  --purple2:  #a59bf9;
  --purple3:  #ede9fe;
  --green:    #22c55e;
  --green2:   #dcfce7;
  --amber:    #f59e0b;
  --amber2:   #fef3c7;
  --blue:     #3b82f6;
  --blue2:    #dbeafe;
  --red:      #ef4444;
  --red2:     #fee2e2;
  --text:     #1a1a2e;
  --text2:    #6b7280;
  --text3:    #9ca3af;
  --shadow:   0 2px 16px rgba(124,111,247,0.08);
  --shadow2:  0 4px 24px rgba(124,111,247,0.14);
  --font:     'Plus Jakarta Sans', sans-serif;
  --r:        16px;
  --r2:       12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ══════════════════════════════
   TELA 1 — ROTINA
══════════════════════════════ */
.s1-header { padding: 52px 20px 0; background: var(--bg); }
.s1-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.s1-greeting { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.s1-date-chip { background: var(--purple3); color: var(--purple); font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
.edit-btn { background: var(--bg2); border: 1.5px solid var(--border); color: var(--text2); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
.edit-btn.active { background: var(--purple3); border-color: var(--purple); color: var(--purple); }

/* WEEK */
.week-wrap { padding: 0 16px 14px; background: var(--bg); }
.week { display: flex; gap: 4px; }
.day-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; padding: 8px 0; border-radius: 12px; cursor: pointer; transition: background 0.15s; }
.day-name { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
.day-num { font-size: 15px; font-weight: 700; color: var(--text2); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
.day-btn.today .day-num { background: var(--purple); color: #fff; }
.day-btn.active:not(.today) .day-num { background: var(--bg3); color: var(--text); border: 1.5px solid var(--border); }
.day-pip { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
.day-btn.has-items .day-pip { background: var(--purple2); }
.day-btn.today .day-pip { background: var(--purple); }

/* PROGRESS CARD */
.prog-card { margin: 0 16px 14px; background: var(--purple); border-radius: var(--r); padding: 16px 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow2); }
.prog-ring-wrap { flex-shrink: 0; position: relative; width: 56px; height: 56px; }
.prog-ring-wrap svg { transform: rotate(-90deg); }
.prog-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 4; }
.prog-ring-fill { fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1); }
.prog-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
.prog-info { flex: 1; }
.prog-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 2px; }
.prog-sub { font-size: 12px; color: rgba(255,255,255,0.7); }
.prog-focus { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.prog-focus-val { font-size: 13px; font-weight: 700; color: #fff; }
.prog-focus-lbl { font-size: 11px; color: rgba(255,255,255,0.6); }

/* SECTION */
.content { flex: 1; padding: 0 16px 90px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.sec-label { display: flex; align-items: center; gap: 8px; }
.sec-icon { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.sec-name { font-size: 13px; font-weight: 700; color: var(--text); }
.sec-count { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 20px; }

.sec-saude        .sec-icon { background: var(--green2); }
.sec-estudos      .sec-icon { background: var(--blue2); }
.sec-trabalho     .sec-icon { background: var(--amber2); }
.sec-demandas     .sec-icon { background: #fce7f3; }
.sec-encerramento .sec-icon { background: var(--purple3); }

/* ITEMS */
.items { display: flex; flex-direction: column; gap: 8px; }
.item { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--r2); padding: 12px 14px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s; position: relative; }
.item:active { transform: scale(0.98); }
.item.done { opacity: 0.45; }
.item.done .item-name { text-decoration: line-through; color: var(--text3); }
.item.timing { border-color: var(--purple); background: var(--purple3); }

.check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.item.done .check { background: var(--green); border-color: var(--green); }
.check-icon { display: none; }
.item.done .check-icon { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.item-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.item-time { font-size: 11px; font-weight: 500; color: var(--text3); }
.item-focus-badge { font-size: 10px; font-weight: 700; color: var(--purple); background: var(--purple3); padding: 1px 7px; border-radius: 20px; }

.item-actions { display: flex; align-items: center; gap: 6px; }
.timer-btn { width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
.timer-btn:active { transform: scale(0.9); }
.item.timing .timer-btn { background: var(--purple); border-color: var(--purple); }
.item-del { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: var(--red); flex-shrink: 0; }
.edit-mode .item-del { display: flex; }

.empty-state { font-size: 12px; color: var(--text3); padding: 14px; border: 1.5px dashed var(--border); border-radius: var(--r2); text-align: center; font-weight: 500; }

/* ══════════════════════════════
   TELA 2 — RELATÓRIO
══════════════════════════════ */
.s2-header { padding: 52px 20px 16px; background: var(--bg); }
.s2-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
.s2-sub { font-size: 13px; color: var(--text2); font-weight: 500; }

.report-content { flex: 1; padding: 0 16px 90px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }

.report-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); }
.report-card-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

/* Big stat */
.stat-row { display: flex; gap: 10px; }
.stat-box { flex: 1; background: var(--bg3); border-radius: var(--r2); padding: 14px 12px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; }
.stat-lbl { font-size: 11px; font-weight: 600; color: var(--text3); margin-top: 2px; }
.stat-box.purple .stat-num { color: var(--purple); }
.stat-box.green  .stat-num { color: var(--green); }
.stat-box.amber  .stat-num { color: var(--amber); }

/* Bar chart */
.bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 70px; margin-bottom: 8px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--purple3); transition: height 0.5s cubic-bezier(.4,0,.2,1); min-height: 4px; position: relative; }
.bar.filled { background: var(--purple); }
.bar.today-bar { background: var(--purple); box-shadow: 0 0 8px rgba(124,111,247,0.4); }
.bar-label { font-size: 9px; font-weight: 600; color: var(--text3); }

/* Focus breakdown */
.focus-list { display: flex; flex-direction: column; gap: 8px; }
.focus-item { display: flex; align-items: center; gap: 10px; }
.focus-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.focus-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.focus-time { font-size: 12px; font-weight: 700; color: var(--text2); }
.focus-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.focus-bar-fill { height: 100%; border-radius: 2px; }

/* Heatmap */
.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.hm-cell { aspect-ratio: 1; border-radius: 3px; background: var(--bg3); }
.hm-cell.l1 { background: var(--purple3); }
.hm-cell.l2 { background: var(--purple2); opacity: 0.5; }
.hm-cell.l3 { background: var(--purple2); opacity: 0.8; }
.hm-cell.l4 { background: var(--purple); }
.hm-labels { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 4px; }
.hm-label { font-size: 8px; font-weight: 600; color: var(--text3); text-align: center; }

/* ══════════════════════════════
   MODAIS
══════════════════════════════ */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.5); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 20px 20px 36px; width: 100%; border-top: 3px solid var(--purple); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 18px; letter-spacing: -0.02em; }
.modal-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.modal-field { margin-bottom: 14px; }
.modal-input { width: 100%; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 15px; font-weight: 600; color: var(--text); font-family: var(--font); outline: none; transition: border-color 0.2s; appearance: none; }
.modal-input:focus { border-color: var(--purple); }
.modal-row { display: flex; gap: 10px; }
.modal-row .modal-field { flex: 1; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-cancel { flex: 1; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--text2); cursor: pointer; }
.modal-save { flex: 2; background: var(--purple); border: none; border-radius: 14px; padding: 14px; font-family: var(--font); font-size: 15px; font-weight: 800; color: #fff; cursor: pointer; }

/* FOCUS TIMER MODAL */
.focus-modal { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; border-top: 3px solid var(--purple); text-align: center; }
.focus-item-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
.focus-timer-display { font-size: 56px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); margin-bottom: 8px; }
.focus-timer-lbl { font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 28px; text-transform: uppercase; letter-spacing: 0.06em; }
.focus-ring-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 28px; }
.focus-ring-wrap svg { transform: rotate(-90deg); }
.focus-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
.focus-ring-fill { fill: none; stroke: var(--purple); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.focus-time-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.focus-time-big { font-size: 36px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); }
.focus-time-sub { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.focus-btns { display: flex; gap: 12px; justify-content: center; }
.focus-btn { padding: 14px 28px; border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 800; cursor: pointer; border: none; transition: all 0.2s; }
.focus-btn.start { background: var(--purple); color: #fff; flex: 1; }
.focus-btn.stop { background: var(--red2); color: var(--red); flex: 1; }
.focus-btn.close { background: var(--bg3); color: var(--text2); }

/* ══════════════════════════════
   FAB + BOTTOM NAV
══════════════════════════════ */
.fab { position: fixed; bottom: 78px; right: 18px; width: 52px; height: 52px; border-radius: 14px; background: var(--purple); border: none; font-size: 22px; color: #fff; cursor: pointer; z-index: 51; box-shadow: 0 4px 20px rgba(124,111,247,0.4); display: flex; align-items: center; justify-content: center; font-weight: 800; transition: transform 0.15s; }
.fab:active { transform: scale(0.9); }
.fab.hidden { display: none; }

.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-top: 1.5px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 10px 0 26px; z-index: 50; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 4px 20px; }
.nav-icon { font-size: 20px; }
.nav-lbl { font-size: 10px; font-weight: 600; color: var(--text3); }
.nav-item.active .nav-lbl { color: var(--purple); }
.nav-item.active .nav-icon { filter: none; }
</style>
</head>
<body>
<div id="app">

  <!-- ── SCREEN 1: ROTINA ── -->
  <div class="screen active" id="screen-rotina">
    <div class="s1-header">
      <div class="s1-top">
        <div>
          <div class="s1-greeting" id="s1-greeting">Bom dia 👋</div>
        </div>
        <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">Editar</button>
      </div>
    </div>
    <div class="week-wrap">
      <div class="week" id="week-strip"></div>
    </div>
    <div style="padding:0 16px 14px">
      <div class="prog-card" id="prog-card">
        <div class="prog-ring-wrap">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="prog-ring-bg" cx="28" cy="28" r="22"/>
            <circle class="prog-ring-fill" id="prog-ring" cx="28" cy="28" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
          </svg>
          <div class="prog-ring-text" id="prog-pct">0%</div>
        </div>
        <div class="prog-info">
          <div class="prog-title" id="prog-title">Vamos lá!</div>
          <div class="prog-sub" id="prog-sub">0 de 0 atividades concluídas</div>
          <div class="prog-focus">
            <div class="prog-focus-val" id="prog-focus-val">0min</div>
            <div class="prog-focus-lbl">em foco hoje</div>
          </div>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <!-- ── SCREEN 2: RELATÓRIO ── -->
  <div class="screen" id="screen-relatorio">
    <div class="s2-header">
      <div class="s2-title">Relatório</div>
      <div class="s2-sub" id="s2-sub-date"></div>
    </div>
    <div class="report-content" id="report-content"></div>
  </div>

  <button class="fab" id="fab-btn" onclick="openFab()">+</button>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-rotina" onclick="switchScreen('rotina')">
      <span class="nav-icon">☰</span><span class="nav-lbl">Rotina</span>
    </button>
    <button class="nav-item" id="nav-relatorio" onclick="switchScreen('relatorio')">
      <span class="nav-icon">📊</span><span class="nav-lbl">Relatório</span>
    </button>
  </nav>
</div>

<!-- Modal editar item -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Editar atividade</div>
    <div class="modal-field"><div class="modal-label">Nome</div><input class="modal-input" id="edit-name" type="text"/></div>
    <div class="modal-row">
      <div class="modal-field"><div class="modal-label">Início</div><input class="modal-input" id="edit-start" type="time"/></div>
      <div class="modal-field"><div class="modal-label">Fim</div><input class="modal-input" id="edit-end" type="time"/></div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modal-edit')">Cancelar</button>
      <button class="modal-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal nova atividade -->
<div class="modal-overlay" id="modal-fab">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova atividade</div>
    <div class="modal-field"><div class="modal-label">Nome</div><input class="modal-input" id="fab-name" type="text" placeholder="Ex: Meditação"/></div>
    <div class="modal-row">
      <div class="modal-field"><div class="modal-label">Início</div><input class="modal-input" id="fab-start" type="time"/></div>
      <div class="modal-field"><div class="modal-label">Fim</div><input class="modal-input" id="fab-end" type="time"/></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Categoria</div>
      <select class="modal-input" id="fab-cat">
        <option value="saude">🏃 Saúde</option>
        <option value="estudos">📚 Estudos</option>
        <option value="trabalho">💼 Trabalho</option>
        <option value="demandas" selected>📋 Demanda do dia</option>
        <option value="encerramento">🌙 Encerramento</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('modal-fab')">Cancelar</button>
      <button class="modal-save" onclick="saveFab()">Adicionar</button>
    </div>
  </div>
</div>

<!-- Modal cronômetro de foco -->
<div class="modal-overlay" id="modal-focus">
  <div class="focus-modal">
    <div class="modal-handle"></div>
    <div class="focus-item-name" id="focus-item-name">—</div>
    <div class="focus-ring-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="focus-ring-bg" cx="80" cy="80" r="68"/>
        <circle class="focus-ring-fill" id="focus-ring" cx="80" cy="80" r="68" stroke-dasharray="427.3" stroke-dashoffset="0"/>
      </svg>
      <div class="focus-time-overlay">
        <div class="focus-time-big" id="focus-display">00:00</div>
        <div class="focus-time-sub" id="focus-state-lbl">pronto para iniciar</div>
      </div>
    </div>
    <div class="focus-btns">
      <button class="focus-btn close" onclick="closeFocusModal()">Fechar</button>
      <button class="focus-btn start" id="focus-start-btn" onclick="toggleFocus()">▶ Iniciar</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const FULL_DAYS = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];

const DEFAULTS = [
  {id:'s1',sec:'saude',       name:'Acordar cedo',          start:'06:00',end:'06:30',fixed:true},
  {id:'s2',sec:'saude',       name:'Exercício físico',       start:'07:00',end:'08:00',fixed:true},
  {id:'s3',sec:'saude',       name:'Hidratação (2L de água)',start:'',    end:'',     fixed:true},
  {id:'s4',sec:'saude',       name:'Alimentação saudável',   start:'',    end:'',     fixed:true},
  {id:'e1',sec:'estudos',     name:'Leitura (30 min)',        start:'08:00',end:'08:30',fixed:true},
  {id:'e2',sec:'estudos',     name:'Revisão de conteúdo',     start:'18:00',end:'19:00',fixed:true},
  {id:'e3',sec:'estudos',     name:'Prática / exercícios',    start:'19:00',end:'20:00',fixed:true},
  {id:'t1',sec:'trabalho',    name:'Revisar prioridades',     start:'09:00',end:'09:30',fixed:true},
  {id:'t2',sec:'trabalho',    name:'Checar e-mails',          start:'09:30',end:'10:00',fixed:true},
  {id:'t3',sec:'trabalho',    name:'Verificar pendências',    start:'10:00',end:'10:30',fixed:true},
  {id:'n1',sec:'encerramento',name:'Revisar o dia',           start:'20:00',end:'20:30',fixed:true},
];

const SECTIONS = [
  {id:'saude',       name:'Saúde',          icon:'🏃'},
  {id:'estudos',     name:'Estudos',         icon:'📚'},
  {id:'trabalho',    name:'Trabalho',        icon:'💼'},
  {id:'demandas',    name:'Demandas do dia', icon:'📋'},
  {id:'encerramento',name:'Encerramento',    icon:'🌙'},
];

const SEC_COLORS = {saude:'#22c55e',estudos:'#3b82f6',trabalho:'#f59e0b',demandas:'#ec4899',encerramento:'#7c6ff7'};

// ── STATE ──
let state = {items:[],checked:{},focusTimes:{},activeDay:new Date().getDay(),editMode:false};
let editTarget = null;
let focusTarget = null;
let focusSeconds = 0;
let focusInterval = null;
let focusRunning = false;
let currentScreen = 'rotina';

// ── PERSIST ──
function load() {
  try {
    const s = JSON.parse(localStorage.getItem('rotina_v3')||'{}');
    state.items      = s.items      || JSON.parse(JSON.stringify(DEFAULTS));
    state.checked    = s.checked    || {};
    state.focusTimes = s.focusTimes || {};
  } catch(e) {
    state.items = JSON.parse(JSON.stringify(DEFAULTS));
    state.checked = {}; state.focusTimes = {};
  }
}
function save() { localStorage.setItem('rotina_v3', JSON.stringify({items:state.items,checked:state.checked,focusTimes:state.focusTimes})); }
function ck(id) { return state.activeDay+'_'+id; }
function todayKey() { const n=new Date(); return `${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`; }

// ── TOGGLE ITEM ──
function toggleItem(id) { state.checked[ck(id)]=!state.checked[ck(id)]; save(); render(); }

// ── EDIT MODE ──
function toggleEdit() {
  state.editMode=!state.editMode;
  const btn=document.getElementById('edit-btn');
  btn.classList.toggle('active',state.editMode);
  btn.textContent=state.editMode?'Pronto':'Editar';
  document.getElementById('app').classList.toggle('edit-mode',state.editMode);
  render();
}

// ── MODALS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openEditModal(id) {
  const item=state.items.find(i=>i.id===id); if(!item) return;
  editTarget=id;
  document.getElementById('edit-name').value=item.name;
  document.getElementById('edit-start').value=item.start||'';
  document.getElementById('edit-end').value=item.end||'';
  document.getElementById('modal-edit').classList.add('open');
}
function saveEdit() {
  const item=state.items.find(i=>i.id===editTarget); if(!item) return;
  item.name=document.getElementById('edit-name').value.trim()||item.name;
  item.start=document.getElementById('edit-start').value;
  item.end=document.getElementById('edit-end').value;
  closeModal('modal-edit'); save(); render();
}
function deleteItem(id) { state.items=state.items.filter(i=>i.id!==id); save(); render(); }

function openFab() {
  ['fab-name','fab-start','fab-end'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-fab').classList.add('open');
}
function saveFab() {
  const name=document.getElementById('fab-name').value.trim(); if(!name) return;
  state.items.push({id:'u_'+Date.now(),sec:document.getElementById('fab-cat').value,name,
    start:document.getElementById('fab-start').value,end:document.getElementById('fab-end').value,fixed:false});
  closeModal('modal-fab'); save(); render();
}

// ── FOCUS TIMER ──
function openFocusModal(id) {
  const item = state.items.find(i=>i.id===id); if(!item) return;
  if(focusTarget && focusTarget!==id && focusRunning) stopFocus();
  focusTarget = id;
  const key = todayKey()+'_'+id;
  focusSeconds = state.focusTimes[key]||0;
  document.getElementById('focus-item-name').textContent = item.name;
  updateFocusDisplay();
  document.getElementById('modal-focus').classList.add('open');
}
function closeFocusModal() { document.getElementById('modal-focus').classList.remove('open'); }

function updateFocusDisplay() {
  const m = Math.floor(focusSeconds/60), s = focusSeconds%60;
  document.getElementById('focus-display').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  // ring animation (max 60min = 3600s)
  const circ = 427.3;
  const progress = Math.min(focusSeconds/3600,1);
  document.getElementById('focus-ring').style.strokeDashoffset = circ*(1-progress);
  document.getElementById('focus-state-lbl').textContent = focusRunning ? 'em foco ●' : (focusSeconds>0?'pausado':'pronto para iniciar');
  document.getElementById('focus-start-btn').textContent = focusRunning ? '⏸ Pausar' : (focusSeconds>0?'▶ Continuar':'▶ Iniciar');
  document.getElementById('focus-start-btn').className = 'focus-btn '+(focusRunning?'stop':'start');
}

function toggleFocus() {
  if(focusRunning) { stopFocus(); } else { startFocus(); }
}
function startFocus() {
  focusRunning=true;
  focusInterval=setInterval(()=>{
    focusSeconds++;
    const key=todayKey()+'_'+focusTarget;
    state.focusTimes[key]=(state.focusTimes[key]||0)+1;
    save(); updateFocusDisplay(); updateProgressCard();
  },1000);
  updateFocusDisplay();
}
function stopFocus() {
  focusRunning=false;
  clearInterval(focusInterval);
  updateFocusDisplay(); render();
}

function getTodayFocusTotal() {
  const prefix=todayKey()+'_';
  return Object.entries(state.focusTimes)
    .filter(([k])=>k.startsWith(prefix))
    .reduce((sum,[,v])=>sum+v,0);
}
function fmtTime(s) {
  if(s<60) return s+'s';
  const m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0) return h+'h'+(m%60>0?' '+(m%60)+'min':'');
  return m+'min';
}

// ── WEEK ──
function buildWeek() {
  const strip=document.getElementById('week-strip');
  strip.innerHTML='';
  const today=new Date(),dow=today.getDay();
  for(let i=0;i<7;i++){
    const d=new Date(today); d.setDate(today.getDate()-dow+i);
    const isToday=i===dow,isActive=i===state.activeDay;
    const hasDone=state.items.some(it=>state.checked[i+'_'+it.id]);
    const btn=document.createElement('button');
    btn.className='day-btn'+(isToday?' today':'')+(isActive?' active':'')+(hasDone?' has-items':'');
    btn.innerHTML=`<span class="day-name">${DAYS[i]}</span><span class="day-num">${d.getDate()}</span><span class="day-pip"></span>`;
    btn.onclick=()=>{state.activeDay=i;buildWeek();render();};
    strip.appendChild(btn);
  }
  // greeting
  const hour=new Date().getHours();
  const g=hour<12?'Bom dia 👋':hour<18?'Boa tarde 👋':'Boa noite 👋';
  document.getElementById('s1-greeting').textContent=g;
}

// ── PROGRESS CARD ──
function updateProgressCard() {
  const total=state.items.length;
  const done=state.items.filter(it=>state.checked[ck(it.id)]).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  const circ=138.2;
  document.getElementById('prog-ring').style.strokeDashoffset=circ*(1-pct/100);
  const title=pct===100?'Dia completo! 🎉':pct>=50?'Indo bem!':'Vamos lá!';
  document.getElementById('prog-title').textContent=title;
  document.getElementById('prog-sub').textContent=done+' de '+total+' atividades concluídas';
  const focusTotal=getTodayFocusTotal();
  document.getElementById('prog-focus-val').textContent=fmtTime(focusTotal);
}

// ── RENDER ROTINA ──
function render() {
  const content=document.getElementById('content');
  content.innerHTML='';
  const isEdit=state.editMode;

  SECTIONS.forEach(sec=>{
    const secItems=state.items.filter(i=>i.sec===sec.id);
    const doneCount=secItems.filter(i=>state.checked[ck(i.id)]).length;

    const section=document.createElement('div');
    section.className=`section sec-${sec.id}`;

    const hdr=document.createElement('div');
    hdr.className='section-header';
    hdr.innerHTML=`
      <div class="sec-label">
        <div class="sec-icon">${sec.icon}</div>
        <div class="sec-name">${sec.name}</div>
      </div>
      <span class="sec-count">${doneCount}/${secItems.length}</span>
    `;
    section.appendChild(hdr);

    const itemsEl=document.createElement('div');
    itemsEl.className='items';

    if(secItems.length===0){
      const e=document.createElement('div');
      e.className='empty-state';
      e.textContent='Nenhuma atividade. Toque em + para adicionar.';
      itemsEl.appendChild(e);
    }

    secItems.forEach(item=>{
      const done=!!state.checked[ck(item.id)];
      const isTiming=focusTarget===item.id&&focusRunning;
      const focusKey=todayKey()+'_'+item.id;
      const itemFocus=state.focusTimes[focusKey]||0;
      const row=document.createElement('div');
      row.className='item'+(done?' done':'')+(isTiming?' timing':'');
      const timeStr=item.start&&item.end?item.start+' → '+item.end:item.start||'';
      row.innerHTML=`
        <div class="check">
          <svg class="check-icon" width="12" height="9" viewBox="0 0 12 9" fill="none">
            <path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">
            ${timeStr?`<span class="item-time">⏰ ${timeStr}</span>`:''}
            ${itemFocus>0?`<span class="item-focus-badge">⚡ ${fmtTime(itemFocus)}</span>`:''}
          </div>
        </div>
        <div class="item-actions">
          <button class="timer-btn" onclick="event.stopPropagation();openFocusModal('${item.id}')" title="Cronômetro de foco">
            ${isTiming?'<span style="color:#fff;font-size:12px">●</span>':'⏱'}
          </button>
          ${isEdit?`<button class="item-del" onclick="event.stopPropagation();deleteItem('${item.id}')">✕</button>`:''}
        </div>
      `;
      row.addEventListener('click',e=>{
        if(e.target.closest('.timer-btn,.item-del')) return;
        isEdit?openEditModal(item.id):toggleItem(item.id);
      });
      itemsEl.appendChild(row);
    });

    section.appendChild(itemsEl);
    content.appendChild(section);
  });

  updateProgressCard();
}

// ── RENDER RELATÓRIO ──
function renderReport() {
  const rc=document.getElementById('report-content');
  rc.innerHTML='';
  const now=new Date();
  document.getElementById('s2-sub-date').textContent=now.getDate()+' de '+MONTHS[now.getMonth()]+', '+now.getFullYear();

  // ── Hoje ──
  const total=state.items.length;
  const todayDow=now.getDay();
  const doneCk=k=>state.items.filter(it=>state.checked[k+'_'+it.id]).length;
  const doneToday=doneCk(todayDow);
  const pctToday=total?Math.round(doneToday/total*100):0;
  const focusToday=getTodayFocusTotal();

  const card1=document.createElement('div');
  card1.className='report-card';
  card1.innerHTML=`
    <div class="report-card-title">Hoje</div>
    <div class="stat-row">
      <div class="stat-box purple"><div class="stat-num">${pctToday}%</div><div class="stat-lbl">concluído</div></div>
      <div class="stat-box green"><div class="stat-num">${doneToday}/${total}</div><div class="stat-lbl">atividades</div></div>
      <div class="stat-box amber"><div class="stat-num">${fmtTime(focusToday)}</div><div class="stat-lbl">em foco</div></div>
    </div>
  `;
  rc.appendChild(card1);

  // ── Semana ──
  const weekCard=document.createElement('div');
  weekCard.className='report-card';
  const weekDone=[];
  for(let i=0;i<7;i++){
    const d=doneCk(i);
    weekDone.push({day:DAYS[i],pct:total?Math.round(d/total*100):0,done:d,isToday:i===todayDow});
  }
  const weekAvg=Math.round(weekDone.reduce((s,d)=>s+d.pct,0)/7);
  const maxPct=Math.max(...weekDone.map(d=>d.pct),1);
  let barsHtml=weekDone.map(d=>`
    <div class="bar-col">
      <div class="bar ${d.isToday?'today-bar':d.pct>0?'filled':''}" style="height:${Math.round((d.pct/maxPct)*56)+4}px"></div>
      <div class="bar-label">${d.day}</div>
    </div>
  `).join('');
  weekCard.innerHTML=`
    <div class="report-card-title">Esta semana</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.03em">${weekAvg}%</div>
      <div style="font-size:12px;font-weight:600;color:var(--text3)">média de conclusão</div>
    </div>
    <div class="bar-chart">${barsHtml}</div>
  `;
  rc.appendChild(weekCard);

  // ── Foco por atividade ──
  const focusCard=document.createElement('div');
  focusCard.className='report-card';
  const prefix=todayKey()+'_';
  const focusItems=state.items.map(it=>{
    const k=prefix+it.id;
    return {name:it.name,sec:it.sec,secs:state.focusTimes[k]||0};
  }).filter(f=>f.secs>0).sort((a,b)=>b.secs-a.secs);
  const maxFocus=Math.max(...focusItems.map(f=>f.secs),1);
  const focusHtml=focusItems.length?focusItems.map(f=>`
    <div class="focus-item">
      <div class="focus-dot" style="background:${SEC_COLORS[f.sec]||'var(--purple)'}"></div>
      <div class="focus-name">${f.name}</div>
      <div class="focus-bar-wrap"><div class="focus-bar-fill" style="width:${Math.round(f.secs/maxFocus*100)}%;background:${SEC_COLORS[f.sec]||'var(--purple)'}"></div></div>
      <div class="focus-time">${fmtTime(f.secs)}</div>
    </div>
  `).join(''):'<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px 0">Nenhuma sessão de foco hoje ainda.</div>';
  focusCard.innerHTML=`<div class="report-card-title">Foco por atividade — hoje</div><div class="focus-list">${focusHtml}</div>`;
  rc.appendChild(focusCard);

  // ── Mês (heatmap) ──
  const monthCard=document.createElement('div');
  monthCard.className='report-card';
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="hm-cell"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateObj=new Date(now.getFullYear(),now.getMonth(),d);
    const dow=dateObj.getDay();
    const doneD=doneCk(dow);
    const pctD=total?Math.round(doneD/total*100):0;
    const lvl=pctD===0?'':pctD<25?'l1':pctD<50?'l2':pctD<75?'l3':'l4';
    cells+=`<div class="hm-cell ${lvl}" title="${d}/${now.getMonth()+1}: ${pctD}%"></div>`;
  }
  const monthAvgArr=[];
  for(let d=1;d<=daysInMonth;d++){const dw=new Date(now.getFullYear(),now.getMonth(),d).getDay();monthAvgArr.push(total?Math.round(doneCk(dw)/total*100):0);}
  const monthAvg=Math.round(monthAvgArr.reduce((s,v)=>s+v,0)/daysInMonth);
  monthCard.innerHTML=`
    <div class="report-card-title">Este mês — ${MONTHS[now.getMonth()].toUpperCase()}</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.03em">${monthAvg}%</div>
      <div style="font-size:12px;font-weight:600;color:var(--text3)">média mensal</div>
    </div>
    <div class="heatmap">${cells}</div>
    <div class="hm-labels"><span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span></div>
  `;
  rc.appendChild(monthCard);
}

// ── SWITCH SCREEN ──
function switchScreen(name) {
  currentScreen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  const fab=document.getElementById('fab-btn');
  fab.classList.toggle('hidden', name!=='rotina');
  if(name==='relatorio') renderReport();
}

// ── INIT ──
load(); buildWeek(); render();
setInterval(()=>{const n=new Date();if(n.getHours()===0&&n.getMinutes()===0){state.checked={};save();render();}},60000);
</script>
</body>
